<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">

<!-- hair -->
<path d="M130 90
Q200 10 270 90
Q240 40 200 50
Q160 40 130 90"
fill="#1f1f1f"/>

<!-- head -->
<circle cx="200" cy="110" r="55" fill="#f1c27d"/>

<!-- eyes -->
<circle cx="180" cy="110" r="4"/>
<circle cx="220" cy="110" r="4"/>

<!-- smile -->
<path d="M180 135 Q200 150 220 135"
stroke="black"
stroke-width="3"
fill="transparent"/>

<!-- hoodie -->
<path d="
M140 180
Q200 140 260 180
L280 300
L120 300
Z"
fill="#4d7cff"/>

<!-- hood -->
<ellipse
cx="200"
cy="175"
rx="50"
ry="25"
fill="#3f63e8"/>

<!-- left arm -->
<line
x1="140"
y1="220"
x2="90"
y2="280"
stroke="#f1c27d"
stroke-width="22"
stroke-linecap="round"/>

<!-- right arm -->
<line
x1="260"
y1="220"
x2="330"
y2="250"
stroke="#f1c27d"
stroke-width="22"
stroke-linecap="round"/>

<!-- left leg -->
<line
x1="165"
y1="300"
x2="130"
y2="430"
stroke="#222"
stroke-width="25"
stroke-linecap="round"/>

<!-- right leg -->
<line
x1="235"
y1="300"
x2="280"
y2="430"
stroke="#222"
stroke-width="25"
stroke-linecap="round"/>

<!-- shoes -->
<ellipse cx="125" cy="440" rx="30" ry="10" fill="white"/>
<ellipse cx="285" cy="440" rx="30" ry="10" fill="white"/>

</svg>